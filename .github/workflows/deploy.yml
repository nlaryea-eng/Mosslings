name: Deploy to GitHub Pages

# Publish the game on every push to main. The test suite must pass first, so a
# red build never ships. Manual runs are allowed via the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; let an in-progress run finish (don't cancel mid-deploy).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run test suite
        run: node tests/run-tests.js

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stage runtime files only
        # Zero build step — copy just what the browser needs, leaving tests/,
        # docs/, .github/ and dotfiles out of the published site.
        run: |
          mkdir -p _site
          cp index.html style.css _site/
          cp -r js assets _site/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
